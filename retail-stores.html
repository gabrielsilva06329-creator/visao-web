<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retail stores — VISÃO</title>
  <meta name="description" content="retail stores — VISÃO. find us in person.">
  <link rel="icon" type="image/png" href="/images/visao-mark.png">
  <link rel="apple-touch-icon" href="/images/visao-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary:     #000000;
      --text-primary:   #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted:     #666666;
      --accent-gold:    #c9a961;
      --border-strong:  rgba(255, 255, 255, 0.45);
      --font-mono:      'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; overscroll-behavior-x: none; width: 100%; touch-action: pan-y; }
    html { background: var(--bg-primary); }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font-mono); font-weight: 400; line-height: 1.6;
      min-height: 100vh; min-height: 100svh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 5rem 1.5rem 3rem;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: repeating-linear-gradient(to bottom, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px);
      pointer-events: none; z-index: 1000;
    }
    .home-link {
      position: fixed; top: 1.5rem; left: 1.5rem; font-size: 0.7rem; letter-spacing: 0.08em;
      color: var(--text-secondary); text-transform: lowercase; text-decoration: none;
      transition: color 0.18s ease; z-index: 10;
    }
    .home-link::before { content: '< '; color: var(--accent-gold); }
    .home-link:hover { color: var(--accent-gold); }
    .logo {
      display: block;
      width: 100%; max-width: 200px;
      max-height: 100px; height: auto;
      object-fit: contain;
      margin: 0 auto 0.6rem;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    .page-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.12em; color: var(--text-muted);
      text-transform: lowercase; margin-bottom: 0.4rem;
    }
    .page-eyebrow::before { content: '// '; color: var(--accent-gold); }
    .page-title {
      font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 700;
      letter-spacing: -0.01em; text-transform: lowercase; margin-bottom: 2rem;
    }
    .placeholder-box {
      border: 1px solid var(--border-strong); padding: 2rem 2.5rem;
      max-width: 420px; width: 100%; text-align: center;
      background: rgba(10, 10, 10, 0.6);
    }
    .placeholder-text {
      font-size: 0.82rem; color: var(--text-secondary); line-height: 1.75; margin-bottom: 1.25rem;
    }
    .status-line {
      font-size: 0.7rem; letter-spacing: 0.08em; color: var(--accent-gold);
      text-transform: lowercase; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .status-dot {
      width: 7px; height: 7px; background: var(--accent-gold);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    /* === HAMBURGER + FULL-SCREEN NAV OVERLAY === */
    .nav-toggle {
      position: fixed; top: 1.25rem; right: 1.25rem; z-index: 80;
      width: 2.2rem; height: 2.2rem;
      border: 1px solid var(--border-strong); background: var(--bg-primary);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 4px; cursor: pointer; padding: 0;
      transition: background 0.18s ease;
    }
    .nav-toggle span {
      width: 1rem; height: 1px; background: var(--text-primary);
      transition: background 0.18s ease;
    }
    .nav-toggle:hover { background: var(--text-primary); }
    .nav-toggle:hover span { background: var(--bg-primary); }
    .nav-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.96); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .nav-overlay.open { opacity: 1; visibility: visible; pointer-events: auto; }
    .nav-close {
      position: absolute; top: 1.25rem; right: 1.5rem;
      background: none; border: none; cursor: pointer;
      font-size: 2rem; color: var(--text-secondary);
      line-height: 1; padding: 0.5rem; font-family: inherit;
      transition: color 0.18s ease;
    }
    .nav-close:hover { color: var(--accent-gold); }
    .nav-overlay ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 1.25rem; text-align: center;
    }
    .nav-overlay a {
      color: var(--text-primary); text-decoration: none;
      font-size: 1.3rem; font-weight: 400; letter-spacing: 0.08em;
      text-transform: lowercase; display: inline-block;
      transition: color 0.18s ease, transform 0.18s ease;
    }
    .nav-overlay a:hover { color: var(--accent-gold); transform: scale(1.05); }

    @media (max-width: 480px) {
      body { padding: 4rem 1rem 2rem; }
      .placeholder-box { padding: 1.5rem 1.25rem; }
      .home-link { top: 1rem; left: 1rem; }
      .nav-toggle { top: 1rem; right: 1rem; }
      .nav-overlay a { font-size: 1.15rem; }
      .nav-overlay ul { gap: 1rem; }
    }

    /* === TV / LARGE MONITORS — scale logo + headings up === */
    @media (min-width: 1280px) {
      .logo { max-width: 240px; max-height: 120px; }
    }
    @media (min-width: 1920px) {
      .logo { max-width: 290px; max-height: 145px; }
      .placeholder-box { max-width: 520px; padding: 2.5rem 3rem; }
      .placeholder-text { font-size: 0.95rem; }
    }

  </style>
</head>
<body>
  <a href="/" class="home-link">back home</a>
  <img src="/images/visao-logo.png" alt="VISÃO" class="logo">
  <div class="page-eyebrow">find us in person</div>
  <h1 class="page-title">retail stores</h1>
  <div class="placeholder-box">
    <p class="placeholder-text">currently online-only. select retail partners coming soon — drop @hello@visaoclothing.com to inquire about stocking.</p>
    <span class="status-line"><span class="status-dot"></span>in development</span>
  </div>
  <!-- Hamburger + full-screen overlay nav (jumps between sub-pages) -->
  <button class="nav-toggle" onclick="openNav()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-overlay" id="navOverlay" aria-hidden="true">
    <button class="nav-close" onclick="closeNav()" aria-label="Close menu">&times;</button>
    <ul>
      <li><a href="/">home</a></li>
      <li><a href="/shop">shop</a></li>
      <li><a href="/lookbook">lookbook</a></li>
      <li><a href="/archive">archive</a></li>
      <li><a href="/about">about</a></li>
      <li><a href="/shipping">shipping</a></li>
      <li><a href="/contact">contact</a></li>
      <li><a href="/retail-stores">retail stores</a></li>
      <li><a href="/stickers">stickers</a></li>
    </ul>
  </nav>
  <script>
    function openNav() {
      const o = document.getElementById('navOverlay');
      o.classList.add('open');
      o.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function closeNav() {
      const o = document.getElementById('navOverlay');
      o.classList.remove('open');
      o.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
  </script>
</body>
</html>
