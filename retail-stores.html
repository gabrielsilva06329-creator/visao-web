<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retail stores — VISÃO</title>
  <meta name="description" content="retail stores — VISÃO. find us in person.">
  <link rel="icon" type="image/png" href="/images/visao-mark.png">
  <link rel="apple-touch-icon" href="/images/visao-mark.png">
  <link rel="preload" as="image" href="/images/background2fix.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary:     #000000;
      --text-primary:   #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted:     #666666;
      --accent-gold:    #c9a961;
      --border-strong:  rgba(255, 255, 255, 0.45);
      --font-mono:      'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; overscroll-behavior-x: none; width: 100%; touch-action: pan-y; }
    html { background: var(--bg-primary); }
    body {
      background: transparent; color: var(--text-primary);
      font-family: var(--font-mono); font-weight: 400; line-height: 1.6;
      min-height: 100vh; min-height: 100svh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 5rem 1.5rem 3rem;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: repeating-linear-gradient(to bottom, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px);
      pointer-events: none; z-index: 1000;
    }
    .home-link {
      position: fixed; top: 1.5rem; left: 1.5rem; font-size: 0.7rem; letter-spacing: 0.08em;
      color: var(--text-secondary); text-transform: lowercase; text-decoration: none;
      transition: color 0.18s ease; z-index: 10;
    }
    .home-link::before { content: '< '; color: var(--accent-gold); }
    .home-link:hover { color: var(--accent-gold); }
    .logo {
      display: block;
      width: 100%; max-width: 200px;
      max-height: 100px; height: auto;
      object-fit: contain;
      margin: 0 auto 0.6rem;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    .page-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.12em; color: var(--text-muted);
      text-transform: lowercase; margin-bottom: 0.4rem;
    }
    .page-eyebrow::before { content: '// '; color: var(--accent-gold); }
    .page-title {
      font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 700;
      letter-spacing: -0.01em; text-transform: lowercase; margin-bottom: 2rem;
    }
    .placeholder-box {
      border: 1px solid var(--border-strong); padding: 2rem 2.5rem;
      max-width: 420px; width: 100%; text-align: center;
      background: rgba(10, 10, 10, 0.6);
    }
    .placeholder-text {
      font-size: 0.82rem; color: var(--text-secondary); line-height: 1.75; margin-bottom: 1.25rem;
    }
    .status-line {
      font-size: 0.7rem; letter-spacing: 0.08em; color: var(--accent-gold);
      text-transform: lowercase; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .status-dot {
      width: 7px; height: 7px; background: var(--accent-gold);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    /* === HAMBURGER + FULL-SCREEN NAV OVERLAY === */
    .nav-toggle {
      position: fixed; top: 1.25rem; right: 1.25rem; z-index: 80;
      width: 2.2rem; height: 2.2rem;
      border: 1px solid var(--border-strong); background: var(--bg-primary);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 4px; cursor: pointer; padding: 0;
      transition: background 0.18s ease;
    }
    .nav-toggle span {
      width: 1rem; height: 1px; background: var(--text-primary);
      transition: background 0.18s ease;
    }
    .nav-toggle:hover { background: var(--text-primary); }
    .nav-toggle:hover span { background: var(--bg-primary); }
    .nav-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.96); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .nav-overlay.open { opacity: 1; visibility: visible; pointer-events: auto; }
    .nav-close {
      position: absolute; top: 1.25rem; right: 1.5rem;
      background: none; border: none; cursor: pointer;
      font-size: 2rem; color: var(--text-secondary);
      line-height: 1; padding: 0.5rem; font-family: inherit;
      transition: color 0.18s ease;
    }
    .nav-close:hover { color: var(--accent-gold); }
    .nav-overlay ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 1.25rem; text-align: center;
    }
    .nav-overlay a {
      color: var(--text-primary); text-decoration: none;
      font-size: 1.3rem; font-weight: 400; letter-spacing: 0.08em;
      text-transform: lowercase; display: inline-block;
      transition: color 0.18s ease, transform 0.18s ease;
    }
    .nav-overlay a:hover { color: var(--accent-gold); transform: scale(1.05); }

    @media (max-width: 480px) {
      body { padding: 4rem 1rem 2rem; }
      .placeholder-box { padding: 1.5rem 1.25rem; }
      .home-link { top: 1rem; left: 1rem; }
      .nav-toggle { top: 1rem; right: 1rem; }
      .nav-overlay a { font-size: 1.15rem; }
      .nav-overlay ul { gap: 1rem; }
    }

    /* === TV / LARGE MONITORS — scale logo + headings up === */
    @media (min-width: 1280px) {
      .logo { max-width: 240px; max-height: 120px; }
    }
    @media (min-width: 1920px) {
      .logo { max-width: 290px; max-height: 145px; }
      .placeholder-box { max-width: 520px; padding: 2.5rem 3rem; }
      .placeholder-text { font-size: 0.95rem; }
    }


    /* ===== TAPESTRY BACKGROUND + FALLING-PETAL DRIFT (sub-pages) =====
       Same image as the homepage, but heavily blurred + darker overlay so
       page content stays readable against the busy bg. Drift layer spawns
       sakura petals that fall continuously across the viewport — same
       atmosphere as the homepage. */
    .subpage-bg-fixed {
      position: fixed;
      top: -20px; right: -20px; bottom: -20px; left: -20px;
      z-index: -1;
      background-image:
        linear-gradient(to bottom,
          rgba(0,0,0,0.7) 0%,
          rgba(0,0,0,0.6) 50%,
          rgba(0,0,0,0.78) 100%),
        url('/images/background2fix.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(9px);
      pointer-events: none;
    }
    .drift-layer {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .drift {
      position: absolute;
      top: -40px;
      width: 22px; height: 22px;
      will-change: transform, opacity;
      animation: drift-fall var(--dur, 12s) cubic-bezier(0.4, 0.1, 0.5, 0.9) forwards;
    }
    .drift svg { width: 100%; height: 100%; display: block; }
    @keyframes drift-fall {
      0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      10%  { opacity: var(--peak, 0.55); }
      90%  { opacity: var(--peak, 0.55); }
      100% { transform: translate(var(--dx, 60px), 110vh) rotate(var(--rot, 90deg)); opacity: 0; }
    }


    /* ===== VIEW TRANSITIONS — smooth crossfade between pages =====
       Chrome 111+ / Safari 18+ automatically crossfade between same-
       origin navigations when this rule is present. Older browsers
       ignore it. Hides the "page rebuild" flash when going between
       homepage and sub-pages. */
    @view-transition { navigation: auto; }

    /* ===== CURSOR TRAIL =====
       Sakura petals + green leaves spawn at the cursor as you move.
       Gated to cursor devices only via the script-side matchMedia
       check (touch devices never run the listener). */
    .cursor-trail {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      will-change: transform, opacity;
      animation: trail-drift 1.5s cubic-bezier(0.3, 0, 0.7, 1) forwards;
    }
    .cursor-trail svg { width: 100%; height: 100%; display: block; }
    @keyframes trail-drift {
      0%   { opacity: 0;
             transform: translate(-50%, -50%) scale(0.4) rotate(0deg); }
      15%  { opacity: var(--peak, 0.7);
             transform: translate(-50%, -50%) scale(1) rotate(15deg); }
      100% { opacity: 0;
             transform: translate(-50%, -50%) translate(var(--dx, 0px), 45px) scale(0.6) rotate(var(--rot, 80deg)); }
    }

  </style>
</head>
<body>
  <!-- Tapestry image (blurred) + ambient sakura drift layer. -->
  <div class="subpage-bg-fixed"></div>
  <div class="drift-layer" id="driftLayer"></div>
  <a href="/" class="home-link">back home</a>
  <img src="/images/visao-logo.png" alt="VISÃO" class="logo">
  <div class="page-eyebrow">find us in person</div>
  <h1 class="page-title">retail stores</h1>
  <div class="placeholder-box">
    <p class="placeholder-text">currently online-only. select retail partners coming soon — drop @hello@visaoclothing.com to inquire about stocking.</p>
    <span class="status-line"><span class="status-dot"></span>in development</span>
  </div>
  <!-- Hamburger + full-screen overlay nav (jumps between sub-pages) -->
  <button class="nav-toggle" onclick="openNav()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-overlay" id="navOverlay" aria-hidden="true">
    <button class="nav-close" onclick="closeNav()" aria-label="Close menu">&times;</button>
    <ul>
      <li><a href="/">home</a></li>
      <li><a href="/shop">shop</a></li>
      <li><a href="/lookbook">lookbook</a></li>
      <li><a href="/archive">archive</a></li>
      <li><a href="/shipping">shipping</a></li>
      <li><a href="/about">about</a></li>
    </ul>
  </nav>
  <script>
    function openNav() {
      const o = document.getElementById('navOverlay');
      o.classList.add('open');
      o.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function closeNav() {
      const o = document.getElementById('navOverlay');
      o.classList.remove('open');
      o.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
  </script>

  <script>
    // Ambient falling-petal drift — mirrors the homepage atmosphere on
    // every sub-page. Spawns one petal/leaf every 1.4-2.2s, removes after
    // animation completes. ~8-12 visible at a time. Pauses when tab is
    // hidden so it doesn't burn battery in background.
    (function() {
      const layer = document.getElementById('driftLayer');
      if (!layer) return;
      const SAKURA_SVG = '<svg viewBox="-15 -15 30 30" xmlns="http://www.w3.org/2000/svg">' +
        '<g><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8" opacity="0.95"/></g>' +
        '<g transform="rotate(72)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8" opacity="0.95"/></g>' +
        '<g transform="rotate(144)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8" opacity="0.95"/></g>' +
        '<g transform="rotate(216)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8" opacity="0.95"/></g>' +
        '<g transform="rotate(288)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8" opacity="0.95"/></g>' +
        '<circle cx="0" cy="0" r="1.5" fill="#fff5b0"/></svg>';
      const LEAF_SVG = '<svg viewBox="-2 -8 32 16" xmlns="http://www.w3.org/2000/svg">' +
        '<path d="M 0 0 Q 6 -7 14 -6 Q 22 -5 28 -1 L 29 0 L 28 1 Q 22 5 14 6 Q 6 7 0 0 Z" fill="#6b9047" opacity="0.9"/></svg>';
      let timer = null;
      function spawn() {
        const d = document.createElement('div');
        d.className = 'drift';
        const isSakura = Math.random() < 0.7;
        const sizeRoll = Math.random();
        const size = sizeRoll < 0.35 ? 16 : (sizeRoll < 0.85 ? 24 : 34);
        d.style.left = (Math.random() * 100) + 'vw';
        d.style.width = size + 'px';
        d.style.height = (isSakura ? size : Math.round(size * 0.55)) + 'px';
        d.style.setProperty('--dur', (9 + Math.random() * 6) + 's');
        d.style.setProperty('--dx', ((Math.random() - 0.5) * 250) + 'px');
        d.style.setProperty('--rot', ((Math.random() < 0.5 ? -1 : 1) * (30 + Math.random() * 90)) + 'deg');
        d.style.setProperty('--peak', (0.4 + Math.random() * 0.35).toFixed(2));
        d.innerHTML = isSakura ? SAKURA_SVG : LEAF_SVG;
        layer.appendChild(d);
        setTimeout(() => d.remove(), 17000);
      }
      function scheduleNext() {
        const delay = 1400 + Math.random() * 800;
        timer = setTimeout(() => { spawn(); scheduleNext(); }, delay);
      }
      // Seed a handful at staggered times so the page doesn't open empty
      for (let i = 0; i < 5; i++) setTimeout(spawn, i * 600);
      scheduleNext();
      // Pause when tab is hidden
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && timer) { clearTimeout(timer); timer = null; }
        else if (!document.hidden && !timer) { scheduleNext(); }
      });
    })();
  </script>


  <script>
    // CURSOR TRAIL — sakura + leaves following the mouse on cursor
    // devices only. matchMedia gate means iPhone / iPad / Android never
    // even register the mousemove listener.
    (function() {
      if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
      const SAKURA = '<svg viewBox="-15 -15 30 30" xmlns="http://www.w3.org/2000/svg">' +
        '<g><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8"/></g>' +
        '<g transform="rotate(72)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8"/></g>' +
        '<g transform="rotate(144)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8"/></g>' +
        '<g transform="rotate(216)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8"/></g>' +
        '<g transform="rotate(288)"><path d="M 0 -2 C -6 -4 -7 -10 -3 -12 L -1 -10 L 0 -11 L 1 -10 L 3 -12 C 7 -10 6 -4 0 -2 Z" fill="#f4b8c8"/></g>' +
        '<circle cx="0" cy="0" r="1.5" fill="#fff5b0"/></svg>';
      const LEAF = '<svg viewBox="-2 -8 32 16" xmlns="http://www.w3.org/2000/svg">' +
        '<path d="M 0 0 Q 6 -7 14 -6 Q 22 -5 28 -1 L 29 0 L 28 1 Q 22 5 14 6 Q 6 7 0 0 Z" fill="#6b9047"/></svg>';
      let lastT = 0;
      function onMove(e) {
        const now = performance.now();
        // Throttle to ~14 spawns/sec max — looks like a continuous trail
        // without being a particle storm on fast mouse movement
        if (now - lastT < 70) return;
        lastT = now;
        const p = document.createElement('div');
        p.className = 'cursor-trail';
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        const isSakura = Math.random() < 0.65;
        const sizeRoll = Math.random();
        const size = sizeRoll < 0.4 ? 12 : (sizeRoll < 0.85 ? 18 : 26);
        p.style.width = size + 'px';
        p.style.height = (isSakura ? size : Math.round(size * 0.55)) + 'px';
        p.style.setProperty('--dx', ((Math.random() - 0.5) * 30) + 'px');
        p.style.setProperty('--rot', ((Math.random() < 0.5 ? -1 : 1) * (40 + Math.random() * 80)) + 'deg');
        p.style.setProperty('--peak', (0.5 + Math.random() * 0.25).toFixed(2));
        p.innerHTML = isSakura ? SAKURA : LEAF;
        document.body.appendChild(p);
        setTimeout(function() { p.remove(); }, 1600);
      }
      document.addEventListener('mousemove', onMove, { passive: true });
    })();
  </script>

</body>
</html>
