<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>archive — VISÃO</title>
  <meta name="description" content="archive — VISÃO. past drops, sold out.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #000; --bg-secondary: #0a0a0a;
      --text-primary: #fff; --text-secondary: #aaa; --text-muted: #666;
      --accent-gold: #c9a961;
      --border: rgba(255,255,255,0.18);
      --border-strong: rgba(255,255,255,0.45);
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; overscroll-behavior-x: none; width: 100%; touch-action: pan-y; }
    html { background: var(--bg-primary); scroll-behavior: smooth; }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font-mono); font-weight: 400; line-height: 1.6;
      min-height: 100vh; min-height: 100svh;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: repeating-linear-gradient(to bottom, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px);
      pointer-events: none; z-index: 1000;
    }

    .page-header {
      position: sticky; top: 0; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 2rem;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .home-link {
      font-size: 0.72rem; letter-spacing: 0.08em;
      color: var(--text-secondary); text-transform: lowercase;
      text-decoration: none; transition: color 0.18s ease;
    }
    .home-link::before { content: '< '; color: var(--accent-gold); }
    .home-link:hover { color: var(--accent-gold); }
    .logo {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: block; height: 38px; width: auto; max-width: 120px;
      object-fit: contain;
      transition: transform 0.2s ease, filter 0.2s ease;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
    }
    .logo:hover { transform: translateX(-50%) scale(1.06); }

    /* === HAMBURGER + NAV OVERLAY === */
    .nav-toggle {
      width: 2.2rem; height: 2.2rem;
      border: 1px solid var(--border-strong); background: transparent;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 4px; cursor: pointer; padding: 0; flex-shrink: 0;
      transition: background 0.18s ease;
    }
    .nav-toggle span {
      width: 1rem; height: 1px; background: var(--text-primary);
      transition: background 0.18s ease;
    }
    .nav-toggle:hover { background: var(--text-primary); }
    .nav-toggle:hover span { background: var(--bg-primary); }
    .nav-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.96); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .nav-overlay.open { opacity: 1; visibility: visible; pointer-events: auto; }
    .nav-close {
      position: absolute; top: 1.25rem; right: 1.5rem;
      background: none; border: none; cursor: pointer;
      font-size: 2rem; color: var(--text-secondary);
      line-height: 1; padding: 0.5rem; font-family: inherit;
      transition: color 0.18s ease;
    }
    .nav-close:hover { color: var(--accent-gold); }
    .nav-overlay ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 1.25rem; text-align: center;
    }
    .nav-overlay a {
      color: var(--text-primary); text-decoration: none;
      font-size: 1.3rem; font-weight: 400; letter-spacing: 0.08em;
      text-transform: lowercase; display: inline-block;
      transition: color 0.18s ease, transform 0.18s ease;
    }
    .nav-overlay a:hover { color: var(--accent-gold); transform: scale(1.05); }

    main { padding: 4rem 0 6rem; }
    .block { max-width: 1440px; margin: 0 auto; padding: 0 3rem; }
    .block-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 3rem; gap: 2rem; flex-wrap: wrap;
    }
    .block-title {
      font-weight: 700; font-size: clamp(1.5rem, 3.5vw, 2.4rem);
      line-height: 1.1; letter-spacing: -0.02em; text-transform: lowercase;
    }
    .block-title em { color: var(--accent-gold); font-style: normal; }
    .ascii-rule {
      color: var(--text-muted); overflow: hidden; white-space: nowrap;
      height: 1.4em; line-height: 1.4; font-size: 0.8rem;
      user-select: none; opacity: 0.6; margin-bottom: 3rem;
    }
    .ascii-rule::after {
      content: "========================================================================================================================================================================================================";
    }
    .label {
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.06em;
      text-transform: lowercase; color: var(--text-muted);
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .label::before { content: '// '; color: var(--accent-gold); }

    /* === ARCHIVE GRID === */
    .archive-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.55);
    }
    .archive-card {
      aspect-ratio: 3/4; position: relative; overflow: hidden;
      background: var(--bg-secondary); transition: background 0.15s ease;
      display: block; text-decoration: none; color: inherit;
    }
    .archive-card::after {
      content: attr(data-placeholder); position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.7rem; text-align: center; padding: 1rem;
    }
    .archive-card:hover { background: #1a1a1a; }
    .archive-card-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1rem; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      z-index: 2;
    }
    .archive-card-name {
      font-weight: 700; font-size: 0.95rem;
      text-transform: lowercase; margin-bottom: 0.3rem;
    }
    .archive-card-status {
      font-size: 0.62rem; letter-spacing: 0.1em;
      text-transform: lowercase; color: var(--accent-gold);
    }

    @media (max-width: 900px) { .archive-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .archive-row { grid-template-columns: 1fr; }
      .block { padding: 0 1.25rem; }
      .page-header { padding: 0.9rem 1rem; }
      .logo { font-size: 1.15rem; }
      main { padding: 1.5rem 0 4rem; }
      .block-title { font-size: 1.35rem; }
      .nav-overlay a { font-size: 1.15rem; }
      .nav-overlay ul { gap: 1rem; }
    }
    @media (max-width: 375px) {
      .block { padding: 0 1rem; }
      .block-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/" class="home-link">back home</a>
    <img src="/images/visao-logo.png" alt="VISÃO" class="logo">
    <button class="nav-toggle" onclick="openNav()" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="nav-overlay" id="navOverlay" aria-hidden="true">
    <button class="nav-close" onclick="closeNav()" aria-label="Close menu">×</button>
    <ul>
      <li><a href="/">home</a></li>
      <li><a href="/shop">shop</a></li>
      <li><a href="/lookbook">lookbook</a></li>
      <li><a href="/archive">archive</a></li>
      <li><a href="/about">about</a></li>
      <li><a href="/shipping">shipping</a></li>
      <li><a href="/contact">contact</a></li>
      <li><a href="/retail-stores">retail stores</a></li>
      <li><a href="/stickers">stickers</a></li>
    </ul>
  </nav>

  <script>
    function openNav() {
      const o = document.getElementById('navOverlay');
      o.classList.add('open');
      o.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function closeNav() {
      const o = document.getElementById('navOverlay');
      o.classList.remove('open');
      o.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
  </script>

  <main>
    <div class="block">
      <div class="ascii-rule"></div>

      <div class="block-header">
        <div>
          <div class="label">archive</div>
          <h2 class="block-title">past <em>drops</em></h2>
        </div>
      </div>

      <div class="archive-row">
        <a href="/shop" class="archive-card" data-placeholder="drop 001 · sakura preview">
          <div class="archive-card-meta">
            <h3 class="archive-card-name">001 · 桜 sakura</h3>
            <span class="archive-card-status">live now</span>
          </div>
        </a>
        <a href="#" class="archive-card" data-placeholder="drop 002 · in production">
          <div class="archive-card-meta">
            <h3 class="archive-card-name">002 · coming soon</h3>
            <span class="archive-card-status">in production</span>
          </div>
        </a>
        <a href="#" class="archive-card" data-placeholder="drop 003 · brasil capsule preview">
          <div class="archive-card-meta">
            <h3 class="archive-card-name">003 · brasil</h3>
            <span class="archive-card-status">in development</span>
          </div>
        </a>
      </div>
    </div>
  </main>
</body>
</html>
